<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background white -->
  <rect width="64" height="64" fill="white"/>
  
  <!-- Book icon - open book -->
  <path d="M 12 14 L 32 10 L 52 14 L 52 42 Q 32 48 12 42 Z" fill="none" stroke="black" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Book spine -->
  <line x1="32" y1="10" x2="32" y2="48" stroke="black" stroke-width="2.5"/>
  
  <!-- Pages lines left -->
  <line x1="18" y1="20" x2="28" y2="18" stroke="black" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="28" x2="30" y2="26" stroke="black" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="36" x2="30" y2="35" stroke="black" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Pages lines right -->
  <line x1="36" y1="18" x2="46" y2="20" stroke="black" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="26" x2="48" y2="28" stroke="black" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="35" x2="48" y2="36" stroke="black" stroke-width="1.5" opacity="0.7"/>
</svg>
