<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistema SOA de Gestion Escolar</title>
  <style>
    :root {
      --bg: #eef2f8;
      --panel: #ffffff;
      --ink: #13253a;
      --muted: #5f728d;
      --line: #d6deea;
      --accent: #0b6ed0;
      --accent-2: #0f7f68;
      --danger: #b93a3a;
      --nav-bg: #0c2035;
      --nav-soft: #183a5d;
      --nav-active: #1172d6;
      --shadow: 0 14px 32px rgba(19, 37, 58, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 4% 5%, #dfe9ff 0, transparent 27%),
        radial-gradient(circle at 100% 0%, #f2e9ff 0, transparent 24%),
        var(--bg);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: linear-gradient(180deg, #0d2239 0%, var(--nav-bg) 100%);
      color: #d7e8ff;
      padding: 22px 14px;
      border-right: 1px solid #233c59;
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.2px;
      line-height: 1.3;
      margin-bottom: 14px;
      font-size: 33px;
    }

    .brand small {
      display: block;
      margin-top: 6px;
      color: #9dc1eb;
      font-weight: 500;
      font-size: 13px;
      font-size: 14px;
    }

    .token-box {
      border: 1px solid #315175;
      background: linear-gradient(180deg, #163150 0%, #132c47 100%);
      border-radius: 12px;
      padding: 11px;
      font-size: 11px;
      color: #b8d4f4;
      margin-bottom: 14px;
      word-break: break-all;
      max-height: 88px;
      overflow: auto;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      border: 1px solid #2b4b70;
      color: #d3e8ff;
      background: var(--nav-soft);
      border-radius: 11px;
      text-align: left;
      padding: 11px 12px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s ease;
    }

    .nav button:hover {
      background: #1f486f;
      transform: translateY(-1px);
    }

    .nav button.active {
      background: linear-gradient(180deg, var(--nav-active) 0%, #0e62bb 100%);
      border-color: #2f8de4;
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .main {
      padding: 22px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .top h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0.3px;
    }

    .top .health {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--line);
      background: #ffffffd6;
      backdrop-filter: blur(2px);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      color: #435873;
      font-weight: 600;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(420px, 1.1fr) minmax(380px, 1fr);
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0.2px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 14px;
      line-height: 1.45;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    .field { margin-bottom: 11px; }

    label {
      display: block;
      font-size: 12px;
      color: #4d6481;
      margin-bottom: 5px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #c9d7e8;
      border-radius: 10px;
      font-size: 14px;
      padding: 10px;
      background: #fcfdff;
      color: #1d3049;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #63a4e6;
      box-shadow: 0 0 0 3px rgba(11, 110, 208, 0.13);
    }

    textarea {
      min-height: 144px;
      font-family: Consolas, monospace;
      resize: vertical;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    button.action {
      border: none;
      color: #fff;
      background: linear-gradient(180deg, #1377dc 0%, var(--accent) 100%);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button.action:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }

    button.alt { background: var(--accent-2); }
    button.warn { background: #8a611d; }
    button.danger { background: var(--danger); }

    .status {
      margin-top: 9px;
      font-size: 12px;
      font-weight: 600;
    }

    .ok { color: #08784b; }
    .fail { color: #b22020; }

    pre {
      margin: 8px 0 0;
      border-radius: 10px;
      border: 1px solid #202f46;
      background: #0f1724;
      color: #d8e8ff;
      padding: 10px;
      font-size: 12px;
      max-height: 480px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      line-height: 1.5;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #5a6f87;
      line-height: 1.4;
    }

    @media (max-width: 1200px) {
      .content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid #234266;
        height: auto;
        position: static;
        overflow: visible;
      }

      .nav {
        display: flex;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .nav button {
        white-space: nowrap;
        min-width: 132px;
      }

      .main { padding: 14px; }
      .row { grid-template-columns: 1fr; }
      .card { padding: 13px; }
      .pill { font-size: 11px; }
    }

    @media (max-width: 640px) {
      .brand { font-size: 24px; }
      .token-box { font-size: 10px; }
      button.action { width: 100%; }
      .btns { display: grid; grid-template-columns: 1fr; }
      pre { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        Sistema SOA de Gestion Escolar
        <small>Portal funcional de pruebas</small>
      </div>
      <div class="token-box" id="tokenBox">Token: sin iniciar sesion</div>
      <div class="nav" id="nav"></div>
    </aside>

    <main class="main">
      <div class="top">
        <h1 id="title">Dashboard SOA</h1>
        <div class="health">
          <span class="pill">Gateway: http://localhost:3000</span>
          <button class="action alt" id="btnHealth">Verificar salud</button>
        </div>
      </div>

      <div class="content">
        <section class="card">
          <h2 id="formTitle">Formulario</h2>
          <p class="muted" id="formDesc">Selecciona un modulo para probar funcionalidades reales.</p>
          <div id="formArea"></div>
          <div class="status" id="formStatus"></div>
        </section>

        <section class="card">
          <h2>Respuesta API</h2>
          <p class="muted">Aqui veras la respuesta del servidor para cada accion.</p>
          <pre id="output">Esperando acciones...</pre>
        </section>
      </div>
    </main>
  </div>

  <script>
    const state = { token: localStorage.getItem('soa_token') || '' };

    const modules = {
      auth: {
        label: 'Autenticacion',
        title: 'Autenticacion',
        desc: 'Registro, login y perfil del usuario autenticado.',
        render: `
          <div class="row">
            <div class="field"><label>Usuario</label><input id="regUsername" value="demo_admin"></div>
            <div class="field"><label>Email</label><input id="regEmail" value="demo_admin@example.com"></div>
          </div>
          <div class="row">
            <div class="field"><label>Contrasena</label><input id="regPassword" value="DemoPass123!"></div>
            <div class="field"><label>Rol</label><select id="regRole"><option>admin</option><option>student</option><option>teacher</option></select></div>
          </div>
          <div class="btns">
            <button class="action" data-action="auth-register">Registrar</button>
            <button class="action alt" data-action="auth-login">Iniciar sesion</button>
            <button class="action warn" data-action="auth-profile">Ver perfil</button>
          </div>
          <p class="hint">Si el usuario ya existe, cambia el email para registrar nuevamente.</p>
        `,
      },
      students: {
        label: 'Estudiantes',
        title: 'Estudiantes',
        desc: 'Crear estudiante y consultar listado general.',
        render: `
          <div class="row">
            <div class="field"><label>Numero de matricula</label><input id="sEnrollment" value="STU-${Date.now()}"></div>
            <div class="field"><label>Email</label><input id="sEmail" value="student_${Date.now()}@example.com"></div>
          </div>
          <div class="row">
            <div class="field"><label>Nombre</label><input id="sFirst" value="Ana"></div>
            <div class="field"><label>Apellido</label><input id="sLast" value="Lopez"></div>
          </div>
          <div class="row">
            <div class="field"><label>Password</label><input id="sPass" value="Pass12345"></div>
            <div class="field"><label>Fecha de nacimiento</label><input id="sDob" value="2007-03-10"></div>
          </div>
          <div class="field"><label>Genero</label><select id="sGender"><option>F</option><option>M</option><option>Other</option></select></div>
          <div class="btns">
            <button class="action" data-action="students-create">Crear estudiante</button>
            <button class="action alt" data-action="students-list">Listar estudiantes</button>
          </div>
        `,
      },
      teachers: {
        label: 'Docentes',
        title: 'Docentes',
        desc: 'Crear docente y consultar listado.',
        render: `
          <div class="row">
            <div class="field"><label>ID de empleado</label><input id="tEmp" value="EMP-${Date.now()}"></div>
            <div class="field"><label>Email</label><input id="tEmail" value="teacher_${Date.now()}@example.com"></div>
          </div>
          <div class="row">
            <div class="field"><label>Nombre</label><input id="tFirst" value="Carlos"></div>
            <div class="field"><label>Apellido</label><input id="tLast" value="Diaz"></div>
          </div>
          <div class="row">
            <div class="field"><label>Password</label><input id="tPass" value="Pass12345"></div>
            <div class="field"><label>Especializacion</label><input id="tSpec" value="Matematicas"></div>
          </div>
          <div class="field"><label>Fecha de contratacion</label><input id="tHire" value="2024-01-10"></div>
          <div class="btns">
            <button class="action" data-action="teachers-create">Crear docente</button>
            <button class="action alt" data-action="teachers-list">Listar docentes</button>
          </div>
        `,
      },
      enrollment: {
        label: 'Matricula',
        title: 'Matricula',
        desc: 'Matricular estudiante en aula (requiere classroom existente).',
        render: `
          <div class="row">
            <div class="field"><label>ID de estudiante</label><input id="eStudent" value="1"></div>
            <div class="field"><label>ID de aula</label><input id="eClassroom" value="1"></div>
          </div>
          <div class="field"><label>Fecha matricula</label><input id="eDate" value="2026-04-15"></div>
          <div class="btns">
            <button class="action" data-action="enroll-create">Matricular</button>
            <button class="action alt" data-action="enroll-by-student">Ver matriculas por estudiante</button>
          </div>
          <p class="hint">Si falla con classroom not found, crea registros base en la BD (tabla classrooms).</p>
        `,
      },
      attendance: {
        label: 'Asistencia',
        title: 'Asistencia',
        desc: 'Registrar y consultar asistencia por estudiante.',
        render: `
          <div class="row">
            <div class="field"><label>ID de estudiante</label><input id="aStudent" value="1"></div>
            <div class="field"><label>ID de aula</label><input id="aClassroom" value="1"></div>
          </div>
          <div class="row">
            <div class="field"><label>Fecha</label><input id="aDate" value="2026-04-15"></div>
            <div class="field"><label>Estado</label><select id="aStatus"><option value="present">Presente</option><option value="absent">Ausente</option><option value="late">Tarde</option><option value="excused">Justificado</option></select></div>
          </div>
          <div class="btns">
            <button class="action" data-action="att-mark">Marcar asistencia</button>
            <button class="action alt" data-action="att-get">Consultar asistencia</button>
          </div>
        `,
      },
      payments: {
        label: 'Pagos',
        title: 'Pagos',
        desc: 'Generar factura y consultar facturas por estudiante.',
        render: `
          <div class="row">
            <div class="field"><label>ID de estudiante</label><input id="pStudent" value="1"></div>
            <div class="field"><label>Monto</label><input id="pAmount" value="1500.00"></div>
          </div>
          <div class="row">
            <div class="field"><label>Tipo de cuota</label><input id="pType" value="Mensualidad"></div>
            <div class="field"><label>Vencimiento</label><input id="pDue" value="2026-05-15"></div>
          </div>
          <div class="btns">
            <button class="action" data-action="pay-create">Generar factura</button>
            <button class="action alt" data-action="pay-list">Ver facturas del estudiante</button>
          </div>
        `,
      },
      notifications: {
        label: 'Notificaciones',
        title: 'Notificaciones',
        desc: 'Enviar notificacion in-app y consultar notificaciones.',
        render: `
          <div class="row">
            <div class="field"><label>User ID destino</label><input id="nUser" value="1"></div>
            <div class="field"><label>Asunto</label><input id="nSubject" value="Aviso sistema"></div>
          </div>
          <div class="field"><label>Mensaje</label><textarea id="nMsg">Mensaje de prueba desde el portal SOA.</textarea></div>
          <div class="btns">
            <button class="action" data-action="not-send">Enviar in-app</button>
            <button class="action alt" data-action="not-list">Ver notificaciones usuario</button>
          </div>
        `,
      },
      explorer: {
        label: 'Explorador API',
        title: 'Explorador API',
        desc: 'Ejecuta cualquier endpoint del gateway con el token actual.',
        render: `
          <div class="row">
            <div class="field"><label>Metodo</label><select id="xMethod"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select></div>
            <div class="field"><label>Ruta</label><input id="xPath" value="/api/students"></div>
          </div>
          <div class="field"><label>Body JSON</label><textarea id="xBody">{
  "example": true
}</textarea></div>
          <div class="btns">
            <button class="action" data-action="x-run">Ejecutar request</button>
          </div>
        `,
      },
    };

    let activeKey = 'auth';

    function el(id) { return document.getElementById(id); }

    function showResult(ok, status, data) {
      const st = el('formStatus');
      st.className = 'status ' + (ok ? 'ok' : 'fail');
      st.textContent = status;
      el('output').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
      el('tokenBox').textContent = state.token ? ('Token: ' + state.token) : 'Token: sin iniciar sesion';
    }

    async function api(path, method = 'GET', body = null, auth = true) {
      const headers = { 'Content-Type': 'application/json' };
      if (auth && state.token) {
        headers.Authorization = 'Bearer ' + state.token;
      }
      const opts = { method, headers };
      if (body && method !== 'GET' && method !== 'DELETE') opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      const raw = await res.text();
      let data = raw;
      try { data = JSON.parse(raw); } catch (_) {}
      return { ok: res.ok, status: res.status, data };
    }

    function bindModuleActions() {
      document.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const action = btn.getAttribute('data-action');
          try {
            let r;

            if (action === 'auth-register') {
              r = await api('/api/auth/register', 'POST', {
                username: el('regUsername').value,
                email: el('regEmail').value,
                password: el('regPassword').value,
                role: el('regRole').value,
              }, false);
            }

            if (action === 'auth-login') {
              r = await api('/api/auth/login', 'POST', {
                email: el('regEmail').value,
                password: el('regPassword').value,
              }, false);
              if (r.ok && r.data && r.data.data && r.data.data.token) {
                state.token = r.data.data.token;
                localStorage.setItem('soa_token', state.token);
              }
            }

            if (action === 'auth-profile') r = await api('/api/auth/profile', 'GET', null, true);

            if (action === 'students-create') {
              r = await api('/api/students', 'POST', {
                enrollmentNumber: el('sEnrollment').value,
                firstName: el('sFirst').value,
                lastName: el('sLast').value,
                email: el('sEmail').value,
                password: el('sPass').value,
                dateOfBirth: el('sDob').value,
                gender: el('sGender').value,
              }, false);
            }

            if (action === 'students-list') r = await api('/api/students', 'GET', null, true);

            if (action === 'teachers-create') {
              r = await api('/api/teachers', 'POST', {
                employeeId: el('tEmp').value,
                firstName: el('tFirst').value,
                lastName: el('tLast').value,
                email: el('tEmail').value,
                password: el('tPass').value,
                specialization: el('tSpec').value,
                hireDate: el('tHire').value,
              }, false);
            }

            if (action === 'teachers-list') r = await api('/api/teachers', 'GET', null, true);

            if (action === 'enroll-create') {
              r = await api('/api/enrollments', 'POST', {
                studentId: Number(el('eStudent').value),
                classroomId: Number(el('eClassroom').value),
                enrollmentDate: el('eDate').value,
              }, true);
            }

            if (action === 'enroll-by-student') {
              r = await api('/api/enrollments/student/' + Number(el('eStudent').value), 'GET', null, true);
            }

            if (action === 'att-mark') {
              r = await api('/api/attendance', 'POST', {
                studentId: Number(el('aStudent').value),
                classroomId: Number(el('aClassroom').value),
                attendanceDate: el('aDate').value,
                status: el('aStatus').value,
              }, true);
            }

            if (action === 'att-get') {
              r = await api('/api/attendance/students/' + Number(el('aStudent').value), 'GET', null, true);
            }

            if (action === 'pay-create') {
              r = await api('/api/payments/invoices', 'POST', {
                studentId: Number(el('pStudent').value),
                amount: Number(el('pAmount').value),
                feeType: el('pType').value,
                dueDate: el('pDue').value,
              }, true);
            }

            if (action === 'pay-list') {
              r = await api('/api/payments/students/' + Number(el('pStudent').value) + '/invoices', 'GET', null, true);
            }

            if (action === 'not-send') {
              r = await api('/api/notifications/send/in-app', 'POST', {
                recipientUserId: Number(el('nUser').value),
                subject: el('nSubject').value,
                message: el('nMsg').value,
              }, true);
            }

            if (action === 'not-list') {
              r = await api('/api/notifications/users/' + Number(el('nUser').value), 'GET', null, true);
            }

            if (action === 'x-run') {
              const method = el('xMethod').value;
              const path = el('xPath').value;
              let body = null;
              if (method !== 'GET' && method !== 'DELETE') body = JSON.parse(el('xBody').value || '{}');
              r = await api(path, method, body, true);
            }

            showResult(r.ok, `${r.status} ${r.ok ? 'OK' : 'ERROR'}`, r.data);
          } catch (err) {
            showResult(false, 'Error', String(err));
          }
        });
      });
    }

    function renderModule(key) {
      activeKey = key;
      const mod = modules[key];
      el('title').textContent = 'SOA - ' + mod.title;
      el('formTitle').textContent = mod.title;
      el('formDesc').textContent = mod.desc;
      el('formArea').innerHTML = mod.render;
      bindModuleActions();

      document.querySelectorAll('.nav button').forEach((b) => b.classList.remove('active'));
      const activeBtn = document.querySelector(`.nav button[data-module="${key}"]`);
      if (activeBtn) activeBtn.classList.add('active');
    }

    function renderNav() {
      const nav = el('nav');
      Object.keys(modules).forEach((k) => {
        const b = document.createElement('button');
        b.textContent = modules[k].label;
        b.setAttribute('data-module', k);
        b.addEventListener('click', () => renderModule(k));
        nav.appendChild(b);
      });
    }

    el('btnHealth').addEventListener('click', async () => {
      try {
        const checks = await Promise.all([
          api('/health', 'GET', null, false),
          api('/api/auth/verify', 'POST', {}, false).catch(() => ({ ok: false, status: 401, data: 'No token' })),
        ]);
        const info = {
          gateway: checks[0].status,
          authVerify: checks[1].status,
          tokenLoaded: !!state.token,
        };
        showResult(true, 'Health check', info);
      } catch (e) {
        showResult(false, 'Health check error', String(e));
      }
    });

    renderNav();
    renderModule(activeKey);
    if (state.token) el('tokenBox').textContent = 'Token: ' + state.token;
  </script>
</body>
</html>
